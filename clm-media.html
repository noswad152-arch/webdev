function updateHeroSideBar() {  
 fetch(collectionUrl)
  .then(response => {
    if (!response.ok) throw new Error('Network response was not ok');
    return response.json();
  })
  .then(data => {
    const allItems = data.items;
    const container = document.getElementById('custom-summary-output');
    
    if (!container) return; // Safety check

    // 1. Grab the absolute latest item (the first one)
    const latestItem = allItems[0];

    // 2. Take the rest of the items and shuffle them
    const otherItems = allItems.slice(1); 
    const shuffled = otherItems.sort(() => 0.5 - Math.random());

    // 3. Combine the latest + the first 2 from the shuffled deck
    const finalSelection = [latestItem, ...shuffled.slice(0, 2)];

    let htmlContent = '';

    finalSelection.forEach((item, index) => {
      if (item) {
      
        htmlContent += `
          <div class="custom-item" >
            <img src="${item.assetUrl}?format=500w" alt="${item.title}">
            <p><strong>${item.title}</strong></p>
            <p>${item.excerpt || ''}</p>
            <a href="${item.fullUrl}">Read More</a>
          </div>
        `;
      }
    });

    container.innerHTML = htmlContent;
  }) // Removed the semicolon that was here!
  .catch(err => {
    console.error('Error fetching Squarespace data:', err);
    const container = document.getElementById('custom-summary-output');
    if (container) {
      container.innerHTML = `
        <div class="custom-item">
          <p><strong>Latest writings are unavailable right now.</strong></p>
          <p>This is often caused by browser CORS rules on cross-domain requests.</p>
        </div>
      `;
    }
  });
  }

async function loadAudioGrid() {
  const response = await fetch("https://www.witnessv2.net/static/music-clm.json");
  const items = await response.json();

  const groups = {
    "Formation Series": document.getElementById("formation-grid"),
    "Prayer Series": document.getElementById("prayer-grid"),
    "Inspire Series": document.getElementById("inspire-grid")
  };

  items.forEach((item, index) => {
    const grid = groups[item.subtitle];
    if (!grid) return; // ignore unknown series

    const card = document.createElement("div");
    card.className = "card-player";
    card.dataset.src = item.src;
    card.id = "player" + (index + 1);

    card.innerHTML = `
      <div class="card-player-info">
        <img class="card-player-art" src="${item.image}">
        <div class="card-player-meta">
          <div class="card-player-title">${item.title}</div>
          <div class="card-player-subtitle">${item.series}</div>
        </div>
      </div>

      <div class="card-player-progress">
        <div class="card-player-progress-fill"></div>
      </div>

      <div class="card-player-controls">
        <button class="card-player-btn play">▶</button>
        <button class="card-player-btn stop">■</button>
        <span class="card-player-time">0:00</span>
      </div>
    `;

    grid.appendChild(card);

    // Load duration
    const audio = new Audio(item.src);
    audio.addEventListener("loadedmetadata", () => {
      const duration = fmt(audio.duration);
      card.querySelector(".card-player-subtitle").textContent += ` · ${duration}`;
      card.querySelector(".card-player-time").textContent = `0:00 / ${duration}`;
    });
  });

  // Initialize your existing player logic
  if (window.WitnessInitCardPlayers) {
    window.WitnessInitCardPlayers();
  }
}

function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, "0");
  return `${m}:${s}`;
}

(function () {
  function fmt(seconds) {
    return `${Math.floor(seconds / 60)}:${String(Math.floor(seconds % 60)).padStart(2, '0')}`;
  }

  function initCardPlayers(root) {
    const scope = root || document;
    scope.querySelectorAll('.card-player').forEach(player => {
      if (player.dataset.playerInit === '1') return;
      player.dataset.playerInit = '1';

      const source = (player.dataset.src || '').trim();
      const playBtn = player.querySelector('.play');
      const stopBtn = player.querySelector('.stop');
      const fill = player.querySelector('.card-player-progress-fill');
      const time = player.querySelector('.card-player-time');

      if (!source || !playBtn || !stopBtn || !fill || !time) {
        return;
      }

      const audio = new Audio(source);

      audio.addEventListener('timeupdate', () => {
        const pct = (audio.currentTime / (audio.duration || 1)) * 100;
        fill.style.width = `${pct}%`;
        time.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration || 0)}`;
      });

      audio.addEventListener('ended', () => {
        playBtn.textContent = '▶';
        fill.style.width = '0%';
      });

      playBtn.addEventListener('click', async () => {
        if (audio.paused) {
          try {
            await audio.play();
            playBtn.textContent = '⏸';
          } catch (_) {
            playBtn.textContent = '▶';
          }
        } else {
          audio.pause();
          playBtn.textContent = '▶';
        }
      });

      stopBtn.addEventListener('click', () => {
        audio.pause();
        audio.currentTime = 0;
        playBtn.textContent = '▶';
        fill.style.width = '0%';
      });
    });
  }

  function runInit() {
    initCardPlayers(document);
  }

  window.WitnessInitCardPlayers = runInit;

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runInit, { once: true });
  } else {
    runInit();
  }

  window.addEventListener('load', runInit);
  window.addEventListener('pageshow', runInit);
  window.addEventListener('popstate', runInit);

  const observer = new MutationObserver(mutations => {
    for (const mutation of mutations) {
      for (const node of mutation.addedNodes) {
        if (!(node instanceof Element)) continue;
        if (node.matches?.('.card-player')) {
          initCardPlayers(node.parentElement || document);
          continue;
        }
        if (node.querySelector?.('.card-player')) {
          initCardPlayers(node);
        }
      }
    }
  });
  observer.observe(document.documentElement, { childList: true, subtree: true });
})();
