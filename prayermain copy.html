<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Prayers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@400;500;700&display=swap" rel="stylesheet">

<div class="daily-witness-card">
  <h3 class="dw-heading">Carry This With You — March 30</h3>

  <p class="dw-scripture">
    <strong>Scripture:</strong> John 15:9
  </p>

  <div class="daily-witness-carry">
    You are held in a love that does not waver.
  </div>

  <p class="daily-witness-prayer">
    Lord, steady my heart in Your abiding presence.
  </p>

  <p class="dw-readmore">
    <a href="https://yourdomain.com/reflections/2026-03-30">Read the full reflection</a>
  </p>

  <div class="daily-witness-sigil">✶</div>
</div>

<style>
  :root {
    --bg: #0c1117;
    --panel: rgba(255, 255, 255, 0.03);
    --muted: #9aa7b8;
    --accent: #e7b86f;
    --border: rgba(231, 184, 111, 0.45);
    --font-body: Georgia, "Times New Roman", serif;
    --font-heading: "Cinzel", Georgia, serif;
    --font-ui: system-ui, -apple-system, "Segoe UI", sans-serif;
    --glow: radial-gradient(600px 400px at 20% 0%, rgba(231,184,111,0.12), transparent 70%);
  }

  .daily-witness-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    background-image: var(--glow);
    max-width: 360px;
    margin: 0 auto;
  }

  .dw-heading {
    font-family: var(--font-heading);
    font-size: 1.05rem;
    letter-spacing: 0.5px;
    margin: 0 0 8px;
    color: var(--accent);
  }

  .dw-scripture {
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--muted);
    margin: 0 0 10px;
  }

  .daily-witness-carry {
    border-left: 2px solid var(--accent);
    padding-left: 10px;
    font-style: italic;
    color: var(--accent);
    margin: 12px 0;
    font-family: var(--font-body);
  }

  .daily-witness-prayer {
    font-family: var(--font-body);
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 10px;
    opacity: 0.9;
  }

  .dw-readmore a {
    font-family: var(--font-ui);
    font-size: 0.85rem;
    color: var(--accent);
    text-decoration: none;
  }

  .dw-readmore a:hover {
    text-decoration: underline;
  }

  .daily-witness-sigil {
    text-align: center;
    margin-top: 14px;
    font-family: var(--font-heading);
    font-size: 0.8rem;
    color: var(--border);
    opacity: 0.7;
  }
</style>


</head>
</body>
</html>
