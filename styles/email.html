<div style="font-family: 'Helvetica Neue', Arial, sans-serif; 
            background:#faf7ff; padding:24px; border-radius:16px;
            color:#4a3d60; line-height:1.6;">

  <h2 style="color:#5a3d8c; margin-top:0;">A New Prayer Request</h2>

  <p style="margin:0 0 16px;">
    Someone has submitted a prayer request through the site.
  </p>

  <div style="background:white; padding:16px; border-radius:12px;
              border:1px solid rgba(176,140,255,0.3);">

    <p><strong>Email:</strong><br>{{email}}</p>

    <p><strong>Prayer Focus:</strong><br>{{focus}}</p>

    <p><strong>Prayer Title:</strong><br>{{title}}</p>

    <p><strong>Prayer Text:</strong><br>{{prayer}}</p>
  </div>

  <div style="margin-top:24px; text-align:center;">
    <img src="https://duge79ki51wc4.cloudfront.net/images/asset_a2d6cb5c74bdd165.png"
         alt="Sunrise"
         style="max-width:260px; border-radius:12px; opacity:0.9;
                box-shadow:0 4px 12px rgba(150,120,220,0.25);" />
  </div>

  <div style="margin-top:24px; text-align:center;">
    <a href="https://your-site.com/prayer"
       style="color:#7a5bc9; text-decoration:none; font-weight:600;">
       View Prayer Dashboard
    </a>
  </div>

</div>
