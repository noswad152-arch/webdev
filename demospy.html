<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapgram • Social Media Tracker Demo</title>
  <link rel="stylesheet" href="styles/spy.css">
</head>
<body>
  <div class="header">
    <h1>Snapgram</h1>
    <button id="reset">Reset Profile</button>
  </div>

  <div id="feed" class="feed"></div>

  <div id="profile" class="profile-panel">
    <h2>Your Inferred Interests</h2>
    <div id="interest-bars"></div>
  </div>

  </body>
</html>
<script>
    const topics = ["animals", "religion", "politics", "music", "travel", "tech", "sports", "nature", "food", "fashion"];

const samplePosts = [
  { id: 1, topic: "animals", type: "image", src: "https://duge79ki51wc4.cloudfront.net/images/asset_2e596e56be2d4c80.png", caption: "Chickens are easy to raise..." },
  { id: 2, topic: "religion", type: "video", src: "https://duge79ki51wc4.cloudfront.net/video/asset_aa220238571380c2.mp4", caption: "Watch till the end-- " },
  { id: 3, topic: "politics", type: "image", src: "https://duge79ki51wc4.cloudfront.net/images/asset_6a9ad89365061b4c.jpeg", caption: "⚠️ BREAKING: Shocking New Allegations Split Public Opinion" },
    { id: 4, topic: "animals", type: "image", src: "https://duge79ki51wc4.cloudfront.net/images/asset_5ed225a6b6ce0a28.jpg", caption: "Morning Dove.." },
    { id: 5, topic: "music", type: "image", src: "https://duge79ki51wc4.cloudfront.net/images/asset_377841d4580ab88e.jpeg", caption: "Waznod's new alblum released.." },
    { id: 6, topic: "religion", type: "image", src: "https://duge79ki51wc4.cloudfront.net/images/asset_7ccb3fbcccdbcb73.jpeg", caption: "Pastor Jamaal lights up the stage!" },
    { id: 7, topic: "politics", type: "image", src: "https://duge79ki51wc4.cloudfront.net/images/asset_c43aa8484970c0b4.png", caption: "Where is God in all this mess?" },
    { id: 8, topic: "religion", type: "image", src: "https://duge79ki51wc4.cloudfront.net/images/asset_9802179c23f0c7af.png", caption: "AI takes over the world.." },
    { id: 9, topic: "nature", type: "image", src: "https://duge79ki51wc4.cloudfront.net/images/asset_ae95a47e66bcb99b.png", caption: "Get out and take a breath!" },
    { id: 10, topic: "sports", type: "image", src: "https://duge79ki51wc4.cloudfront.net/images/asset_b40a3af8f65c1a75.jpeg", caption: "Mustangs for the win!!" },
  // Add 15–20 more with different topics...
];

let userProfile = {}; // topic → score

const feed = document.getElementById('feed');
const interestBars = document.getElementById('interest-bars');

function createCard(post) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.topic = post.topic;
  card.dataset.id = post.id;

  let media = '';
  if (post.type === "image") {
    media = `<div class="card-media"><img src="${post.src}" alt="${post.caption}" loading="lazy"></div>`;
  } else {
    media = `<div class="card-media"><video src="${post.src}" muted loop autoplay playsinline preload="metadata"></video></div>`;
  }

  card.innerHTML = `
    <div class="interest-score">0s</div>
    ${media}
    <div class="metadata">
      <p>${post.caption}</p>
    </div>
  `;
  const videoEl = card.querySelector('video');

  // === Tracking Logic ===
  let dwellTime = 0;
  let timer;
  let visibleStart = null;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        visibleStart = Date.now();
        if (videoEl) {
          videoEl.play().catch(() => {});
        }
        timer = setInterval(() => {
          dwellTime = (Date.now() - visibleStart) / 1000;
          card.querySelector('.interest-score').textContent = dwellTime.toFixed(1) + 's';
        }, 100);
      } else {
        if (visibleStart) {
          recordInterest(post.topic, dwellTime);
          clearInterval(timer);
          visibleStart = null;
        }
        if (videoEl) {
          videoEl.pause();
        }
      }
    });
  }, { threshold: 0.6 }); // 60% visible = "paused" on it

  observer.observe(card);

  // Bonus: Mouse hover pause tracking
  card.addEventListener('mouseenter', () => {
    card.style.border = '3px solid #0a84ff';
  });
  card.addEventListener('mouseleave', () => {
    card.style.border = 'none';
  });

  feed.appendChild(card);
}

function recordInterest(topic, seconds) {
  if (seconds < 1.5) return; // too fast = no interest

  userProfile[topic] = (userProfile[topic] || 0) + Math.min(seconds, 12); // cap influence
  renderProfile();
  
  // Dynamic feed adjustment
  if (userProfile[topic] > 10) { // if user has spent more than 15s on this topic, inject more content
    injectMoreOfTopic(topic);
  }
}

function renderProfile() {
  interestBars.innerHTML = '';
  Object.entries(userProfile)
    .sort((a,b) => b[1] - a[1])
    .forEach(([topic, score]) => {
      const percent = Math.min(100, score * 2);
      interestBars.innerHTML += `
        <div>${topic} <span style="float:right">${score.toFixed(1)}s</span></div>
        <div class="bar" style="width: ${percent}%"></div>
      `;
    });
}

function injectMoreOfTopic(topic) {
  // Add new cards of high-interest topic at the bottom
  for (let i = 0; i < 2; i++) {
    const newPost = samplePosts.find(p => p.topic === topic) || samplePosts[Math.floor(Math.random()*samplePosts.length)];
    createCard({...newPost, id: Date.now()});
  }
}

// Init
samplePosts.forEach(createCard);
document.getElementById('reset').addEventListener('click', () => {
  userProfile = {};
  renderProfile();
  feed.innerHTML = '';
  samplePosts.forEach(createCard);
});
</script>
